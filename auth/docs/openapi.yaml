openapi: 3.0.0
info:
  contact: {}
  description: Handles login, token refresh, and user management.
  title: Auth Service API
  version: "3.0"
paths:
  /auth/login:
    post:
      description: Validates credentials against stored user records, issues a
        short-lived access token, and sets a refresh token cookie
      requestBody:
        $ref: "#/components/requestBodies/main.Login"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.AccessTokenResponse"
        "400":
          description: missing or malformed body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "401":
          description: invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "500":
          description: internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Log in with a username and password
      tags:
        - auth
  /auth/refresh:
    post:
      description: Exchanges a valid refresh token cookie + bearer access token for a
        new access/refresh token pair
      parameters:
        - description: Bearer access token
          in: header
          name: Authorization
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.AccessTokenResponse"
        "401":
          description: not authorized / session expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "500":
          description: internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Refresh an access token
      tags:
        - auth
  /users:
    post:
      description: Creates a new user with a bcrypt-hashed password
      requestBody:
        $ref: "#/components/requestBodies/main.Login"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.AccessTokenResponse"
        "400":
          description: missing or malformed body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "401":
          description: invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "500":
          description: internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      tags:
        - users
  "/users/{id}":
    delete:
      requestBody:
        $ref: "#/components/requestBodies/main.Login"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.AccessTokenResponse"
        "400":
          description: missing or malformed body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "401":
          description: invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "500":
          description: internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      tags:
        - users
    get:
      responses: {}
    put:
      requestBody:
        $ref: "#/components/requestBodies/main.Login"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.AccessTokenResponse"
        "400":
          description: missing or malformed body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "401":
          description: invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "500":
          description: internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      tags:
        - users
servers:
  - url: //localhost:8085
components:
  requestBodies:
    main.Login:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/main.Login"
      description: Login credentials
      required: true
  schemas:
    main.AccessTokenResponse:
      properties:
        access_token:
          type: string
      type: object
    main.ErrorResponse:
      properties:
        error:
          type: string
      type: object
    main.Login:
      properties:
        name:
          type: string
        password:
          type: string
      type: object
