basePath: /
definitions:
  main.CommentCreate:
    properties:
      body:
        type: string
      parent_id:
        type: string
    type: object
  main.CommentUpdate:
    properties:
      body:
        type: string
    type: object
  store.Comment:
    properties:
      body:
        type: string
      created_at:
        type: string
      id:
        type: string
      postId:
        type: string
      userId:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for creating, reading, updating, and deleting comments on posts.
  title: Comment Service API
  version: "3.0"
paths:
  /comments/{comment_id}:
    delete:
      description: Deletes a comment owned by the authenticated user
      parameters:
      - description: Comment ID
        in: path
        name: comment_id
        required: true
        type: string
      - description: ID of the authenticated user
        in: header
        name: X-User-ID
        required: true
        type: string
      responses:
        "200":
          description: Comment deleted
        "400":
          description: Comment does not exist
          schema:
            type: string
        "401":
          description: Invalid user id
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Delete a comment
      tags:
      - comments
    get:
      description: Retrieves a single comment by its ID
      parameters:
      - description: Comment ID
        in: path
        name: comment_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.Comment'
        "400":
          description: Comment does not exist
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Get a comment by ID
      tags:
      - comments
    put:
      consumes:
      - application/json
      description: Updates the body of an existing comment
      parameters:
      - description: Comment ID
        in: path
        name: comment_id
        required: true
        type: string
      - description: ID of the authenticated user
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: Updated comment payload
        in: body
        name: comment
        required: true
        schema:
          $ref: '#/definitions/main.CommentUpdate'
      responses:
        "200":
          description: Comment updated
        "400":
          description: Comment does not exist or invalid body
          schema:
            type: string
        "401":
          description: Invalid user id
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Update a comment
      tags:
      - comments
  /posts/{post_id}/comments:
    get:
      description: Retrieves all comments belonging to a post
      parameters:
      - description: Post ID
        in: path
        name: post_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.Comment'
            type: array
        "400":
          description: Post does not exist
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: List comments for a post
      tags:
      - comments
    post:
      consumes:
      - application/json
      description: Creates a new comment (optionally a reply, via parent_id) on a
        post
      parameters:
      - description: Post ID
        in: path
        name: post_id
        required: true
        type: string
      - description: ID of the authenticated user
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: Comment payload
        in: body
        name: comment
        required: true
        schema:
          $ref: '#/definitions/main.CommentCreate'
      produces:
      - application/json
      responses:
        "201":
          description: Comment created
        "400":
          description: Post does not exist or invalid body
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Create a comment
      tags:
      - comments
swagger: "2.0"
