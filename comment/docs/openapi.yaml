openapi: 3.0.0
info:
  contact: {}
  description: API for creating, reading, updating, and deleting comments on posts.
  title: Comment Service API
  version: "3.0"
paths:
  "/comments/{comment_id}":
    delete:
      description: Deletes a comment owned by the authenticated user
      parameters:
        - description: Comment ID
          in: path
          name: comment_id
          required: true
          schema:
            type: string
        - description: ID of the authenticated user
          in: header
          name: X-User-ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Comment deleted
        "400":
          description: Comment does not exist
          content:
            "*/*":
              schema:
                type: string
        "401":
          description: Invalid user id
          content:
            "*/*":
              schema:
                type: string
        "500":
          description: Internal server error
          content:
            "*/*":
              schema:
                type: string
      summary: Delete a comment
      tags:
        - comments
    get:
      description: Retrieves a single comment by its ID
      parameters:
        - description: Comment ID
          in: path
          name: comment_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/store.Comment"
        "400":
          description: Comment does not exist
          content:
            application/json:
              schema:
                type: string
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: string
      summary: Get a comment by ID
      tags:
        - comments
    put:
      description: Updates the body of an existing comment
      parameters:
        - description: Comment ID
          in: path
          name: comment_id
          required: true
          schema:
            type: string
        - description: ID of the authenticated user
          in: header
          name: X-User-ID
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/main.CommentUpdate"
        description: Updated comment payload
        required: true
      responses:
        "200":
          description: Comment updated
        "400":
          description: Comment does not exist or invalid body
          content:
            "*/*":
              schema:
                type: string
        "401":
          description: Invalid user id
          content:
            "*/*":
              schema:
                type: string
        "500":
          description: Internal server error
          content:
            "*/*":
              schema:
                type: string
      summary: Update a comment
      tags:
        - comments
  "/posts/{post_id}/comments":
    get:
      description: Retrieves all comments belonging to a post
      parameters:
        - description: Post ID
          in: path
          name: post_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/store.Comment"
                type: array
        "400":
          description: Post does not exist
          content:
            application/json:
              schema:
                type: string
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: string
      summary: List comments for a post
      tags:
        - comments
    post:
      description: Creates a new comment (optionally a reply, via parent_id) on a post
      parameters:
        - description: Post ID
          in: path
          name: post_id
          required: true
          schema:
            type: string
        - description: ID of the authenticated user
          in: header
          name: X-User-ID
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/main.CommentCreate"
        description: Comment payload
        required: true
      responses:
        "201":
          description: Comment created
        "400":
          description: Post does not exist or invalid body
          content:
            application/json:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: string
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: string
      summary: Create a comment
      tags:
        - comments
servers:
  - url: //localhost:8080
components:
  schemas:
    main.CommentCreate:
      properties:
        body:
          type: string
        parent_id:
          type: string
      type: object
    main.CommentUpdate:
      properties:
        body:
          type: string
      type: object
    store.Comment:
      properties:
        body:
          type: string
        created_at:
          type: string
        id:
          type: string
        postId:
          type: string
        userId:
          type: string
      type: object
