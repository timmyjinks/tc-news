apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: ngf
  namespace: flux-system
spec:
  type: oci
  url: oci://ghcr.io/nginx/charts
  interval: 10m
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ngf
  namespace: flux-system
spec:
  interval: 10m
  install:
    createNamespace: true
  targetNamespace: nginx-gateway
  chart:
    spec:
      chart: nginx-gateway-fabric
      version: "2.6.5"
      sourceRef:
        kind: HelmRepository
        name: ngf
        namespace: flux-system
