services:
  # gateway:
  #   build:
  #     context: ./gateway
  #     dockerfile: ./cmd/Dockerfile

  subscribe:
    build:
      context: ./subscribe
      dockerfile: ./cmd/Dockerfile
    ports:
      - "8080:8080"
    networks:
      - tc-news
    depends_on:
      subscribe-db:
        condition: service_started
  subscribe-db:
    image: "postgres:16"
    ports:
      - "5432:5432"
    networks:
      - tc-news
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

  user:
    build:
      context: ./user
      dockerfile: ./cmd/Dockerfile
    ports:
      - "8081:8080"
    networks:
      - tc-news
    depends_on:
      user-db:
        condition: service_started
  user-db:
    image: "postgres:16"
    networks:
      - tc-news
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

  # vote:
  #   build:
  #     context: ./vote
  #     dockerfile: ./cmd/Dockerfile
  # vote-db:
  #   image: "postgres:16"
  #

  post:
    build:
      context: ./post
      dockerfile: ./cmd/Dockerfile
    ports:
      - "8083:8080"
    networks:
      - tc-news
    depends_on:
      post-db:
        condition: service_started
  post-db:
    image: "postgres:16"
    networks:
      - tc-news
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

  comment:
    build:
      context: ./comment
      dockerfile: ./cmd/Dockerfile
    ports:
      - "8082:8080"
    networks:
      - tc-news
    depends_on:
      comment-db:
        condition: service_started
  comment-db:
    networks:
      - tc-news
    image: "postgres:16"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

  # auth:
