openapi: 3.0.0
info:
  contact: {}
  description: Handles login, token refresh, and user management.
  title: Auth Service API
  version: "3.0"
tags:
  - name: auth
    x-displayName: auth
  - name: users
    x-displayName: users
  - name: openapi_other
    x-displayName: other
  - name: comments
    x-displayName: comments
  - name: notifications
    x-displayName: notifications
  - name: posts
    x-displayName: posts
  - name: votes
    x-displayName: votes
paths:
  /auth/login:
    servers:
      - url: //localhost:8085
    post:
      description: >-
        Validates credentials against stored user records, issues a short-lived
        access token, and sets a refresh token cookie
      requestBody:
        $ref: "#/components/requestBodies/main.Login"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.AccessTokenResponse"
        "400":
          description: missing or malformed body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "401":
          description: invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "500":
          description: internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Log in with a username and password
      tags:
        - auth
  /auth/refresh:
    servers:
      - url: //localhost:8085
    post:
      description: >-
        Exchanges a valid refresh token cookie + bearer access token for a new
        access/refresh token pair
      parameters:
        - description: Bearer access token
          in: header
          name: Authorization
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.AccessTokenResponse"
        "401":
          description: not authorized / session expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "500":
          description: internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Refresh an access token
      tags:
        - auth
  /users:
    servers:
      - url: //localhost:8085
    post:
      description: Creates a new user with a bcrypt-hashed password
      requestBody:
        $ref: "#/components/requestBodies/main.Login"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.AccessTokenResponse"
        "400":
          description: missing or malformed body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "401":
          description: invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "500":
          description: internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      tags:
        - users
  /users/{id}:
    servers:
      - url: //localhost:8085
    delete:
      requestBody:
        $ref: "#/components/requestBodies/main.Login"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.AccessTokenResponse"
        "400":
          description: missing or malformed body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "401":
          description: invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "500":
          description: internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      tags:
        - users
    get:
      responses: {}
      tags:
        - openapi_other
    put:
      requestBody:
        $ref: "#/components/requestBodies/main.Login"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.AccessTokenResponse"
        "400":
          description: missing or malformed body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "401":
          description: invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "500":
          description: internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      tags:
        - users
  /comments/{comment_id}:
    servers:
      - url: //localhost:8080
    delete:
      description: Deletes a comment owned by the authenticated user
      parameters:
        - description: Comment ID
          in: path
          name: comment_id
          required: true
          schema:
            type: string
        - description: ID of the authenticated user
          in: header
          name: X-User-ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Comment deleted
        "400":
          description: Comment does not exist
          content:
            "*/*":
              schema:
                type: string
        "401":
          description: Invalid user id
          content:
            "*/*":
              schema:
                type: string
        "500":
          description: Internal server error
          content:
            "*/*":
              schema:
                type: string
      summary: Delete a comment
      tags:
        - comments
    get:
      description: Retrieves a single comment by its ID
      parameters:
        - description: Comment ID
          in: path
          name: comment_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/store.Comment"
        "400":
          description: Comment does not exist
          content:
            application/json:
              schema:
                type: string
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: string
      summary: Get a comment by ID
      tags:
        - comments
    put:
      description: Updates the body of an existing comment
      parameters:
        - description: Comment ID
          in: path
          name: comment_id
          required: true
          schema:
            type: string
        - description: ID of the authenticated user
          in: header
          name: X-User-ID
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/main.CommentUpdate"
        description: Updated comment payload
        required: true
      responses:
        "200":
          description: Comment updated
        "400":
          description: Comment does not exist or invalid body
          content:
            "*/*":
              schema:
                type: string
        "401":
          description: Invalid user id
          content:
            "*/*":
              schema:
                type: string
        "500":
          description: Internal server error
          content:
            "*/*":
              schema:
                type: string
      summary: Update a comment
      tags:
        - comments
  /posts/{post_id}/comments:
    servers:
      - url: //localhost:8080
    get:
      description: Retrieves all comments belonging to a post
      parameters:
        - description: Post ID
          in: path
          name: post_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/store.Comment"
                type: array
        "400":
          description: Post does not exist
          content:
            application/json:
              schema:
                type: string
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: string
      summary: List comments for a post
      tags:
        - comments
    post:
      description: Creates a new comment (optionally a reply, via parent_id) on a post
      parameters:
        - description: Post ID
          in: path
          name: post_id
          required: true
          schema:
            type: string
        - description: ID of the authenticated user
          in: header
          name: X-User-ID
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/main.CommentCreate"
        description: Comment payload
        required: true
      responses:
        "201":
          description: Comment created
        "400":
          description: Post does not exist or invalid body
          content:
            application/json:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: string
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: string
      summary: Create a comment
      tags:
        - comments
  /notifications/{notification_id}:
    servers:
      - url: //localhost:8080
    delete:
      description: Permanently deletes a notification owned by the authenticated user
      parameters:
        - description: Notification ID
          in: path
          name: notification_id
          required: true
          schema:
            type: string
        - description: ID of the authenticated user
          in: header
          name: X-User-ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Notification deleted
        "400":
          description: Notification does not exist
          content:
            "*/*":
              schema:
                type: string
        "401":
          description: unauthorized
          content:
            "*/*":
              schema:
                type: string
        "500":
          description: Internal server error
          content:
            "*/*":
              schema:
                type: string
      summary: Delete a notification
      tags:
        - notifications
  /notifications/{notification_id}/read:
    servers:
      - url: //localhost:8080
    patch:
      description: Marks a single notification as read for the authenticated user
      parameters:
        - description: Notification ID
          in: path
          name: notification_id
          required: true
          schema:
            type: string
        - description: ID of the authenticated user
          in: header
          name: X-User-ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Notification marked as read
        "401":
          description: unauthorized
          content:
            "*/*":
              schema:
                type: string
        "500":
          description: Internal server error
          content:
            "*/*":
              schema:
                type: string
      summary: Mark a notification as read
      tags:
        - notifications
  /notifications/read-all:
    servers:
      - url: //localhost:8080
    patch:
      description: Marks every notification as read for the authenticated user
      parameters:
        - description: ID of the authenticated user
          in: header
          name: X-User-ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: All notifications marked as read
        "401":
          description: unauthorized
          content:
            "*/*":
              schema:
                type: string
        "500":
          description: Internal server error
          content:
            "*/*":
              schema:
                type: string
      summary: Mark all notifications as read
      tags:
        - notifications
  /user/notifications:
    servers:
      - url: //localhost:8080
    get:
      description: Retrieves all notifications for the authenticated user
      parameters:
        - description: ID of the authenticated user
          in: header
          name: X-User-ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/store.Notification"
                type: array
        "401":
          description: unauthorized
          content:
            application/json:
              schema:
                type: string
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: string
      summary: List a user's notifications
      tags:
        - notifications
  /posts:
    servers:
      - url: //localhost:8081
    get:
      description: Returns every post
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/main.Post"
                type: array
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: List all posts
      tags:
        - posts
    post:
      description: Creates a new post for the requesting user
      parameters:
        - description: Requesting user's ID
          in: header
          name: X-User-ID
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/main.PostCreate"
        description: Post body
        required: true
      responses:
        "200":
          description: post created
        "400":
          description: missing/malformed body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "401":
          description: missing user id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Create a post
      tags:
        - posts
  /posts/{post_id}:
    servers:
      - url: //localhost:8081
    delete:
      description: Deletes a post owned by the requesting user
      parameters:
        - description: Requesting user's ID
          in: header
          name: X-User-ID
          required: true
          schema:
            type: string
        - description: Post ID
          in: path
          name: post_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: post deleted
        "400":
          description: missing post id
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "401":
          description: missing user id
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Delete a post
      tags:
        - posts
    get:
      description: Returns one post by ID
      parameters:
        - description: Post ID
          in: path
          name: post_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.Post"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Get a single post
      tags:
        - posts
    put:
      description: Updates an existing post's body
      parameters:
        - description: Requesting user's ID
          in: header
          name: X-User-ID
          required: true
          schema:
            type: string
        - description: Post ID
          in: path
          name: post_id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/main.PostUpdate"
        description: Updated post body
        required: true
      responses:
        "200":
          description: post updated
        "400":
          description: missing post id or malformed body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "401":
          description: missing user id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/main.ErrorResponse"
      summary: Update a post
      tags:
        - posts
  /comments/{comment_id}/votes:
    servers:
      - url: //localhost:8080
    delete:
      description: Removes the authenticated user's vote on a comment
      parameters:
        - description: Comment ID
          in: path
          name: comment_id
          required: true
          schema:
            type: string
        - description: ID of the authenticated user
          in: header
          name: X-User-ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Vote removed
        "401":
          description: Invalid user id
          content:
            "*/*":
              schema:
                type: string
        "500":
          description: Internal server error
          content:
            "*/*":
              schema:
                type: string
      summary: Remove a vote from a comment
      tags:
        - votes
    put:
      description: Casts or updates the authenticated user's vote on a comment
      parameters:
        - description: Comment ID
          in: path
          name: comment_id
          required: true
          schema:
            type: string
        - description: ID of the authenticated user
          in: header
          name: X-User-ID
          required: true
          schema:
            type: string
      requestBody:
        $ref: "#/components/requestBodies/main.VoteInsert"
      responses:
        "200":
          description: Vote recorded
        "400":
          description: Invalid body
          content:
            "*/*":
              schema:
                type: string
        "401":
          description: Invalid user id
          content:
            "*/*":
              schema:
                type: string
        "500":
          description: Internal server error
          content:
            "*/*":
              schema:
                type: string
      summary: Vote on a comment
      tags:
        - votes
  /posts/{post_id}/votes:
    servers:
      - url: //localhost:8080
    delete:
      description: Removes the authenticated user's vote on a post
      parameters:
        - description: Post ID
          in: path
          name: post_id
          required: true
          schema:
            type: string
        - description: ID of the authenticated user
          in: header
          name: X-User-ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Vote removed
        "401":
          description: Invalid user id
          content:
            "*/*":
              schema:
                type: string
        "500":
          description: Internal server error
          content:
            "*/*":
              schema:
                type: string
      summary: Remove a vote from a post
      tags:
        - votes
    put:
      description: Casts or updates the authenticated user's vote on a post
      parameters:
        - description: Post ID
          in: path
          name: post_id
          required: true
          schema:
            type: string
        - description: ID of the authenticated user
          in: header
          name: X-User-ID
          required: true
          schema:
            type: string
      requestBody:
        $ref: "#/components/requestBodies/main.VoteInsert"
      responses:
        "200":
          description: Vote recorded
        "400":
          description: Invalid body
          content:
            "*/*":
              schema:
                type: string
        "401":
          description: Post does not exist or invalid user id
          content:
            "*/*":
              schema:
                type: string
        "500":
          description: Internal server error
          content:
            "*/*":
              schema:
                type: string
      summary: Vote on a post
      tags:
        - votes
  /user/votes:
    servers:
      - url: //localhost:8080
    get:
      description: Retrieves all votes cast by the authenticated user
      parameters:
        - description: ID of the authenticated user
          in: header
          name: X-User-ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/store.Vote"
                type: array
        "401":
          description: Invalid user id
          content:
            application/json:
              schema:
                type: string
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: string
      summary: List a user's votes
      tags:
        - votes
components:
  requestBodies:
    main.Login:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/main.Login"
      description: Login credentials
      required: true
    main.VoteInsert:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/main.VoteInsert"
      description: Vote payload
      required: true
  schemas:
    main.AccessTokenResponse:
      properties:
        access_token:
          type: string
      type: object
    main.ErrorResponse:
      properties:
        error:
          type: string
      type: object
    main.Login:
      properties:
        name:
          type: string
        password:
          type: string
      type: object
    main.CommentCreate:
      properties:
        body:
          type: string
        parent_id:
          type: string
      type: object
    main.CommentUpdate:
      properties:
        body:
          type: string
      type: object
    store.Comment:
      properties:
        body:
          type: string
        created_at:
          type: string
        id:
          type: string
        postId:
          type: string
        userId:
          type: string
      type: object
    store.Notification:
      properties:
        body:
          type: string
        createdAt:
          type: string
        id:
          type: string
        read:
          type: boolean
        userId:
          type: string
      type: object
    main.Post:
      properties:
        body:
          type: string
        created_at:
          type: string
        id:
          type: string
        user_id:
          type: string
      type: object
    main.PostCreate:
      properties:
        body:
          type: string
      type: object
    main.PostUpdate:
      properties:
        body:
          type: string
      type: object
    main.VoteInsert:
      properties:
        value:
          type: integer
      type: object
    store.Vote:
      properties:
        id:
          type: string
        postId:
          type: string
        userId:
          type: string
        value:
          type: integer
      type: object
x-tagGroups:
  - name: Auth Service API
    tags:
      - auth
      - users
      - openapi_other
  - name: Comment Service API
    tags:
      - comments
  - name: Notification Service API
    tags:
      - notifications
  - name: Post Service API
    tags:
      - posts
  - name: Vote Service API
    tags:
      - votes
